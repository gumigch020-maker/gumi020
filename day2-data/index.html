<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#101018">
  <title>아서 포트폴리오 갤러리</title>
  <style>
    :root{--bg:#101018;--panel:rgba(24,24,36,.92);--silver:#c0c4cc;--pink:#ff7ec0;--sky:#7ed0ff;--text:#f7f8ff;--muted:#aeb1c5}
    *{box-sizing:border-box}html{color-scheme:dark}body{margin:0;min-width:280px;min-height:100vh;color:var(--text);background:radial-gradient(circle at 10% 12%,rgba(255,126,192,.17),transparent 24rem),radial-gradient(circle at 88% 18%,rgba(126,208,255,.16),transparent 25rem),linear-gradient(180deg,#101018,#0d0d16 58%,#101018);font-family:"Trebuchet MS","Malgun Gothic","Apple SD Gothic Neo",sans-serif;line-height:1.65}
    body:before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.18;background-image:linear-gradient(rgba(192,196,204,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(192,196,204,.1) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(to bottom,#000,transparent 85%)}body:after{content:"✦";position:fixed;right:5vw;top:11vh;z-index:-1;color:var(--pink);font-size:clamp(3rem,9vw,8rem);opacity:.08;text-shadow:0 0 22px currentColor;pointer-events:none;animation:float 6s ease-in-out infinite}
    button,a{-webkit-tap-highlight-color:transparent}img{display:block;max-width:100%}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:30px 0 72px}
    .home-link{position:relative;display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:10px 18px;overflow:hidden;border:1px solid rgba(255,255,255,.5);border-radius:999px;color:#101018;background:linear-gradient(135deg,#8d929e,#f7f8ff 29%,var(--sky) 64%,var(--pink));box-shadow:0 8px 26px rgba(255,126,192,.14),inset 0 1px 0 rgba(255,255,255,.85);text-decoration:none;font-weight:900;transition:.2s ease}.home-link:after{content:"";position:absolute;inset:-60% auto -60% -35%;width:30%;transform:rotate(18deg);background:rgba(255,255,255,.62);filter:blur(8px);transition:left .5s ease}.home-link:hover,.home-link:focus-visible{transform:translateY(-2px);box-shadow:0 11px 32px rgba(255,126,192,.2),0 0 25px rgba(126,208,255,.15);outline:0}.home-link:hover:after,.home-link:focus-visible:after{left:110%}
    .hero{position:relative;padding:clamp(68px,10vw,118px) 0 52px}.eyebrow{display:inline-flex;align-items:center;gap:9px;margin:0 0 13px;color:var(--sky);font-size:.75rem;font-weight:900;letter-spacing:.17em}.eyebrow:before{content:"";width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--sky));box-shadow:0 0 8px var(--sky)}h1{max-width:920px;margin:0;font-family:"Arial Black","Malgun Gothic",sans-serif;font-size:clamp(2.6rem,7vw,6.2rem);line-height:1.02;letter-spacing:-.055em}.chrome{color:transparent;background:linear-gradient(180deg,#fff,#dfe3ea 34%,#8e94a1 51%,#f8f9ff 68%,#a9aeba);-webkit-background-clip:text;background-clip:text;text-shadow:0 0 24px rgba(192,196,204,.12)}.pink{color:var(--pink);text-shadow:0 0 24px rgba(255,126,192,.28)}.intro{max-width:720px;margin:22px 0 0;color:var(--silver);font-size:clamp(.98rem,2vw,1.18rem);font-weight:700}.meta{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin-top:26px}.chip{padding:7px 11px;border:1px solid rgba(192,196,204,.28);border-radius:999px;color:var(--muted);background:rgba(192,196,204,.06);font-size:.72rem;font-weight:900;letter-spacing:.09em}.chip.live{color:var(--text);border-color:rgba(255,126,192,.45);box-shadow:0 0 18px rgba(255,126,192,.12)}.chip.live:before{content:"";display:inline-block;width:7px;height:7px;margin-right:7px;border-radius:50%;background:var(--pink);box-shadow:0 0 10px var(--pink)}
    .gallery{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;min-height:180px}.gallery-item{position:relative;min-width:0;margin:0;overflow:hidden;border:1px solid transparent;border-radius:20px;background:linear-gradient(var(--panel),var(--panel)) padding-box,linear-gradient(145deg,rgba(255,255,255,.58),rgba(126,208,255,.45),rgba(255,126,192,.42),rgba(192,196,204,.16)) border-box;box-shadow:0 17px 42px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.05);transition:.25s ease}.gallery-item:after{content:"";position:absolute;inset:-50% auto -50% -35%;width:25%;transform:rotate(18deg);background:rgba(255,255,255,.09);filter:blur(11px);pointer-events:none;transition:left .62s ease}.gallery-item:hover,.gallery-item:focus-within{transform:translateY(-5px);box-shadow:0 22px 54px rgba(0,0,0,.31),0 0 26px rgba(126,208,255,.12),0 0 26px rgba(255,126,192,.1)}.gallery-item:hover:after,.gallery-item:focus-within:after{left:120%}
    .media-button{display:block;width:100%;padding:0;border:0;color:inherit;background:transparent;cursor:zoom-in}.media-frame{position:relative;display:flex;align-items:center;justify-content:center;aspect-ratio:4/3;overflow:hidden;background:linear-gradient(135deg,rgba(255,126,192,.1),rgba(126,208,255,.1)),#151520}.media-frame:before{content:attr(data-badge);position:absolute;z-index:2;top:12px;right:12px;padding:5px 8px;border:1px solid rgba(255,255,255,.4);border-radius:999px;color:#101018;background:rgba(244,246,252,.84);backdrop-filter:blur(7px);font-size:.62rem;font-weight:900;letter-spacing:.08em}.media-frame img,.media-frame video{width:100%;height:100%;object-fit:cover;transition:.42s ease}.gallery-item:hover img{transform:scale(1.045);filter:saturate(1.08)}.media-frame video{background:#080810}.media-frame.audio,.media-frame.download{flex-direction:column;gap:16px;padding:28px;text-align:center}.media-icon{font-size:clamp(2.8rem,8vw,5.5rem);line-height:1;filter:drop-shadow(0 0 18px rgba(126,208,255,.25))}.media-frame audio{width:100%;max-width:330px}.download-link{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:9px 15px;border:1px solid rgba(255,255,255,.45);border-radius:999px;color:#101018;background:linear-gradient(135deg,var(--silver),#fff,var(--sky),var(--pink));text-decoration:none;font-size:.8rem;font-weight:900}
    figcaption{min-width:0;padding:14px 15px 16px;color:var(--silver);font-size:.8rem;font-weight:800;line-height:1.4;overflow-wrap:anywhere}.state{grid-column:1/-1;min-height:220px;display:grid;place-items:center;padding:34px;border:1px solid transparent;border-radius:24px;background:linear-gradient(rgba(24,24,36,.85),rgba(24,24,36,.85)) padding-box,linear-gradient(135deg,rgba(255,255,255,.42),rgba(126,208,255,.34),rgba(255,126,192,.34)) border-box;color:var(--muted);text-align:center}.state strong{display:block;margin-bottom:5px;color:var(--text);font-size:1.08rem}.loader{width:30px;height:30px;margin:0 auto 14px;border:2px solid rgba(192,196,204,.18);border-top-color:var(--pink);border-right-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite}
    .lightbox{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:clamp(18px,4vw,48px);background:rgba(5,5,11,.88);backdrop-filter:blur(16px);cursor:zoom-out}.lightbox.open{display:flex}.lightbox-card{position:relative;display:flex;flex-direction:column;max-width:min(1100px,96vw);max-height:92vh;padding:8px;border:1px solid transparent;border-radius:22px;background:linear-gradient(#14141f,#14141f) padding-box,linear-gradient(145deg,#fff,var(--sky),var(--pink),var(--silver)) border-box;box-shadow:0 0 52px rgba(255,126,192,.18),0 0 52px rgba(126,208,255,.16);cursor:default}.lightbox img{max-width:100%;max-height:calc(92vh - 72px);object-fit:contain;border-radius:15px;background:#0b0b12}.lightbox-caption{max-width:88vw;padding:11px 42px 7px 10px;color:var(--silver);font-size:.8rem;font-weight:800;overflow-wrap:anywhere}.close{position:absolute;right:14px;bottom:10px;width:34px;height:34px;border:1px solid rgba(255,255,255,.38);border-radius:50%;color:#101018;background:linear-gradient(135deg,var(--silver),#fff,var(--pink));font-size:1.05rem;font-weight:900;cursor:pointer}footer{padding:46px 16px 34px;color:#7f8397;text-align:center;font-size:.75rem;letter-spacing:.07em}:focus-visible{outline:2px solid var(--sky);outline-offset:4px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes float{50%{transform:translateY(-12px) rotate(8deg)}}
    @media(min-width:720px){.gallery{grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}}@media(min-width:1050px){.gallery{grid-template-columns:repeat(4,minmax(0,1fr));gap:22px}}@media(max-width:520px){.shell{width:min(100% - 22px,1180px);padding-top:18px}.hero{padding-top:58px}.gallery{gap:10px}.gallery-item{border-radius:15px}figcaption{padding:10px 10px 12px;font-size:.68rem}.media-frame:before{top:7px;right:7px;font-size:.53rem}.media-frame.audio,.media-frame.download{padding:16px}.home-link{min-height:42px;padding:8px 14px;font-size:.84rem}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <main class="shell">
    <a class="home-link" href="../index.html">← 홈으로</a>
    <header class="hero">
      <p class="eyebrow" id="archiveLabel">ARTHUR ARCHIVE</p>
      <h1><span class="chrome" id="dayLabel">PORTFOLIO</span><br><span class="pink" id="titleLabel">GALLERY</span></h1>
      <p class="intro">날짜와 파일 제목에 맞춰 정리한 이미지·영상·음악·압축 파일입니다. 이미지는 클릭하면 크게 볼 수 있습니다.</p>
      <div class="meta"><span class="chip live">LIVE GALLERY</span><span class="chip" id="mediaCount">미디어 확인 중</span><span class="chip">ARTHUR.ZIP</span></div>
    </header>
    <section class="gallery" id="gallery" aria-live="polite" aria-label="산출물 갤러리"><div class="state"><div><div class="loader" aria-hidden="true"></div><strong>산출물을 불러오는 중입니다.</strong><span>폴더의 실제 파일을 확인하고 있어요.</span></div></div></section>
  </main>
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="이미지 크게 보기" aria-hidden="true"><div class="lightbox-card" id="lightboxCard"><img id="lightboxImage" src="" alt=""><div class="lightbox-caption" id="lightboxCaption"></div><button class="close" id="closeButton" type="button" aria-label="큰 이미지 닫기">×</button></div></div>
  <footer>© 2030 ARTHUR CREATIVE ARCHIVE · Y2K EDITION ✦</footer>
  <script>
    (()=>{"use strict";
      const pages={"day1-me":["DAY 01","나 사용설명서","SELF DISCOVERY ARCHIVE"],"day2-data":["DAY 02","창업 기획","DATA BUSINESS ARCHIVE"],"day3-character":["DAY 03","캐릭터 아서","CHARACTER IP ARCHIVE"],"day4-brand":["DAY 04","브랜드","BRAND LAUNCH ARCHIVE"]};
      const parts=location.pathname.split("/").filter(Boolean);if(parts.at(-1)==="index.html")parts.pop();const folder=parts.at(-1)||"";const info=pages[folder]||["PORTFOLIO","GALLERY","ARTHUR ARCHIVE"];
      document.title=`${info[0]} · ${info[1]} | 아서 포트폴리오`;document.getElementById("dayLabel").textContent=info[0];document.getElementById("titleLabel").textContent=info[1];document.getElementById("archiveLabel").textContent=info[2];document.getElementById("gallery").setAttribute("aria-label",`${info[1]} 산출물 갤러리`);
      const repo="gumigch020-maker/gumi020",branch="main",imageRe=/\.(avif|gif|jpe?g|png|svg|webp)$/i,videoRe=/\.(mp4|webm|mov)$/i,audioRe=/\.(m4a|mp3|ogg|wav)$/i,downloadRe=/\.(pdf|zip)$/i,gallery=document.getElementById("gallery"),count=document.getElementById("mediaCount"),lightbox=document.getElementById("lightbox"),card=document.getElementById("lightboxCard"),large=document.getElementById("lightboxImage"),caption=document.getElementById("lightboxCaption"),closeButton=document.getElementById("closeButton"),sorter=new Intl.Collator("ko",{numeric:true,sensitivity:"base"});let lastFocus=null;
      const empty=message=>{gallery.innerHTML=`<div class="state"><div><strong>표시할 산출물이 아직 없습니다.</strong><span>${message}</span></div></div>`;count.textContent="미디어 0개"};
      const close=()=>{if(!lightbox.classList.contains("open"))return;lightbox.classList.remove("open");lightbox.setAttribute("aria-hidden","true");large.src="";document.body.style.overflow="";lastFocus?.focus()};
      const open=(src,name,trigger)=>{lastFocus=trigger;large.src=src;large.alt=`${name} 크게 보기`;caption.textContent=name;lightbox.classList.add("open");lightbox.setAttribute("aria-hidden","false");document.body.style.overflow="hidden";closeButton.focus()};
      const makeBase=name=>{const figure=document.createElement("figure"),cap=document.createElement("figcaption");figure.className="gallery-item";cap.textContent=name;return{figure,cap}};
      const renderImage=(file,src)=>{const{figure,cap}=makeBase(file.name),button=document.createElement("button"),frame=document.createElement("span"),img=document.createElement("img");button.className="media-button";button.type="button";button.setAttribute("aria-label",`${file.name} 크게 보기`);frame.className="media-frame";frame.dataset.badge="VIEW ✦";img.src=src;img.alt=file.name.replace(/\.[^.]+$/," ");img.loading="lazy";img.decoding="async";img.addEventListener("error",()=>figure.remove(),{once:true});button.addEventListener("click",()=>open(src,file.name,button));frame.append(img);button.append(frame);figure.append(button,cap);return figure};
      const renderVideo=(file,src)=>{const{figure,cap}=makeBase(file.name),frame=document.createElement("div"),video=document.createElement("video");frame.className="media-frame";frame.dataset.badge="VIDEO";video.src=src;video.controls=true;video.preload="metadata";video.playsInline=true;video.setAttribute("aria-label",file.name);frame.append(video);figure.append(frame,cap);return figure};
      const renderAudio=(file,src)=>{const{figure,cap}=makeBase(file.name),frame=document.createElement("div"),icon=document.createElement("div"),audio=document.createElement("audio");frame.className="media-frame audio";frame.dataset.badge="AUDIO";icon.className="media-icon";icon.textContent="♫";audio.src=src;audio.controls=true;audio.preload="metadata";audio.setAttribute("aria-label",file.name);frame.append(icon,audio);figure.append(frame,cap);return figure};
      const renderDownload=(file,src)=>{const{figure,cap}=makeBase(file.name),frame=document.createElement("div"),icon=document.createElement("div"),link=document.createElement("a");frame.className="media-frame download";frame.dataset.badge="FILE";icon.className="media-icon";icon.textContent=file.name.toLowerCase().endsWith(".zip")?"ZIP":"PDF";link.className="download-link";link.href=src;link.textContent="파일 열기 ↗";link.setAttribute("download",file.name);frame.append(icon,link);figure.append(frame,cap);return figure};
      const render=files=>{gallery.innerHTML="";files.forEach(file=>{const src=encodeURIComponent(file.name);let item=null;if(imageRe.test(file.name))item=renderImage(file,src);else if(videoRe.test(file.name))item=renderVideo(file,src);else if(audioRe.test(file.name))item=renderAudio(file,src);else if(downloadRe.test(file.name))item=renderDownload(file,src);if(item)gallery.append(item)});count.textContent=`미디어 ${files.length}개`};
      closeButton.addEventListener("click",close);lightbox.addEventListener("click",event=>{if(event.target===lightbox)close()});card.addEventListener("click",event=>event.stopPropagation());document.addEventListener("keydown",event=>{if(event.key==="Escape")close()});
      fetch(`https://api.github.com/repos/${repo}/contents/${encodeURIComponent(folder)}?ref=${branch}`,{headers:{Accept:"application/vnd.github+json"}}).then(response=>{if(!response.ok)throw new Error(`GitHub API ${response.status}`);return response.json()}).then(items=>{const seen=new Set(),files=items.filter(item=>item.type==="file"&&(imageRe.test(item.name)||videoRe.test(item.name)||audioRe.test(item.name)||downloadRe.test(item.name))).filter(item=>{const key=item.name.normalize("NFC").toLowerCase();if(seen.has(key))return false;seen.add(key);return true}).sort((a,b)=>sorter.compare(a.name,b.name));files.length?render(files):empty("이미지·영상·음악·ZIP/PDF 파일을 이 폴더에 추가하면 자동으로 표시됩니다.")}).catch(error=>{console.error(error);empty("GitHub Pages에서 열거나 잠시 뒤 다시 시도해 주세요.")});
    })();
  </script>
</body>
</html>
